kind = "web"
previewPath = "/"
title = "Digit Killer"
version = "1.0.0"
id = "artifacts/digit-killer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19514

[services.development]
run = "pnpm --filter @workspace/digit-killer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digit-killer", "run", "build" ]
publicDir = "artifacts/digit-killer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19514"
BASE_PATH = "/"
